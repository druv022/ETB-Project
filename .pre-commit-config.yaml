# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        exclude: ^uv\.lock$
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-docstring-first

  - repo: https://github.com/psf/black
    rev: 26.3.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Mypy: same command as pre-push and CI (no --ignore-missing-imports)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'mypy src/etb_project'
        language: system
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args:
          # Avoid scanning virtualenv and other non-source directories.
          - -r
          - .
          - -ll
          - -x
          - ./.venv,./venv,./.tox,./.mypy_cache,./.ruff_cache,./build,./dist,./.eggs
        exclude: ^tests/
        pass_filenames: false

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-check-mock-methods
      - id: python-no-eval
      - id: python-use-type-annotations

  # Pre-push: same lint/format/type-check as CI and pre-commit mypy
  - repo: local
    hooks:
      - id: lint-format-typecheck
        name: Lint, format check, type-check (pre-push)
        entry: bash -c 'ruff check . && black --check . && mypy src/etb_project'
        language: system
        stages: [pre-push]
