name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run Ruff
        run: ruff check .

      - name: Check formatting with Black
        run: black --check .

      - name: Run MyPy
        run: mypy src/etb_project

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: |
          pytest tests/ -v --cov=etb_project --cov-report=term-missing --cov-report=html --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Bandit security scan
        run: bandit -r . -ll -x ./.venv,./venv,./.tox,./.mypy_cache,./.ruff_cache,./build,./dist,./.eggs

      - name: Run Safety check
        run: safety check --file requirements.txt

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build image
        run: docker build -t etb:ci .

      - name: Run container and probe /v1/health
        run: |
          set -e
          docker run -d --name etb_ci -p 8000:8000 etb:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/v1/health; then
              exit 0
            fi
            sleep 2
          done
          echo "--- docker logs ---"
          docker logs etb_ci
          exit 1

      - name: Cleanup container
        if: always()
        run: |
          docker stop etb_ci 2>/dev/null || true
          docker rm etb_ci 2>/dev/null || true

  docker-build-windows:
    name: Docker build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker version
        run: docker version

      - name: Build Linux image
        run: docker build -t etb:ci-win .

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, docker-smoke, docker-build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
