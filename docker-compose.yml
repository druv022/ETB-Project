services:
  ollama:
    image: ollama/ollama:latest
    container_name: etb_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama-entrypoint.sh:/entrypoint.sh:ro
      - ./docker/ollama-healthcheck.sh:/healthcheck.sh:ro
    # ollama-python uses OLLAMA_HOST (not OLLAMA_BASE_URL); retriever must reach this hostname.
    environment:
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-qwen3-embedding:0.6b}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/bin/sh /healthcheck.sh"]
      interval: 10s
      timeout: 15s
      retries: 60
      start_period: 300s
    restart: unless-stopped

  retriever:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etb_retriever
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - etb_data:/app/data
      - .:/app
      - /app/.venv
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      # Persist PDF extraction + images under the shared volume (see volumes.etb_data).
      - ETB_DOCUMENT_OUTPUT_DIR=/app/data/document_output
      - ETB_UPLOAD_DIR=/app/data/uploads
      # ollama-python Client reads OLLAMA_HOST; LangChain also accepts base_url from these.
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_BASE_URL=http://ollama:11434
      # HyDE chat LLM (same variables as orchestrator; see src/etb_project/models.py)
      - ETB_LLM_PROVIDER=${ETB_LLM_PROVIDER:-openai_compat}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-${OPENROUTER_API_KEY:-}}
      - OPENAI_MODEL=${OPENAI_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-qwen3.5:9b}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0}
    env_file:
      - .env
    ports:
      - "8000:8000"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "etb_project.api.app:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etb_orchestrator
    depends_on:
      retriever:
        condition: service_started
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      # Orchestrator -> Retriever (httpx read timeout; retrieval can exceed 60s with HyDE/embedding load)
      - RETRIEVER_BASE_URL=http://retriever:8000
      - RETRIEVER_TIMEOUT_S=${RETRIEVER_TIMEOUT_S:-360}
      # LLM provider selection (see src/etb_project/models.py)
      - ETB_LLM_PROVIDER=${ETB_LLM_PROVIDER:-openai_compat}
      # OpenAI-compatible provider (use OpenRouter by setting OPENAI_BASE_URL)
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-${OPENROUTER_API_KEY:-}}
      - OPENAI_MODEL=${OPENAI_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0}
      # Ollama provider (optional)
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-qwen3.5:9b}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0}
      - ORCH_RETRIEVER_K=${ORCH_RETRIEVER_K:-10}
      # Optional LangSmith: LANGCHAIN_TRACING_V2, LANGCHAIN_API_KEY, LANGCHAIN_PROJECT
      # Optional ETB tracing toggles (defaults on): ETB_TRACE_ENABLED, ETB_TRACE_LOG_QUERIES
      - ORCH_SESSION_TTL_SECONDS=${ORCH_SESSION_TTL_SECONDS:-7200}
    env_file:
      - .env
    ports:
      - "8001:8001"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "etb_project.orchestrator.app:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
      ]
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etb_ui
    depends_on:
      orchestrator:
        condition: service_started
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - ORCHESTRATOR_BASE_URL=http://orchestrator:8001
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped

volumes:
  ollama_data:
  etb_data:
