# Narrative LLM configuration for reporting tools.
#
# This file lives under `tools/data_generation/report_generation/` so that
# it is clearly scoped to the reporting utilities and does not affect the
# main application under `src/`.
#
# You can switch between different backends:
# - openai    – standard OpenAI API (api_base usually omitted)
# - openrouter – OpenRouter API (api_base must be https://openrouter.ai/api/v1)
# - ollama    – local Ollama server (api_base is your Ollama host, or omit for localhost)
#
# Values here can be overridden by environment variables:
# - REPORT_LLM_BACKEND      – overrides `backend`
# - REPORT_LLM_MODEL        – overrides `model`
# - REPORT_LLM_API_BASE     – overrides `api_base`
# - REPORT_LLM_API_KEY_ENV  – overrides `api_key_env`
#
# The reporting workflow (`run_report_graph.py`) selects between
# deterministic vs LLM-backed narratives; this file controls which LLM
# provider and model are used when the LLM path is active.

backend: openrouter
model: nvidia/nemotron-3-super-120b-a12b:free
api_base: https://openrouter.ai/api/v1
api_key_env: OPENROUTER_API_KEY

# For local Ollama, uncomment and adjust:
# backend: ollama
# model: llama3
# api_base: http://localhost:11434

temperature: 0.2
max_tokens:
timeout: 60

evaluation_enabled: true
evaluation_min_score: 7.5
max_regeneration_attempts: 2

evaluation_system_prompt: |
  You are a senior management consultant reviewing automatically generated PDF reports.
  Rate the overall quality of each report on a 0–10 scale, where 10 is a polished, executive-ready deck.
  Consider structure, clarity, narrative insight, visual quality of charts, and coherence between text and visuals.
  Provide: (1) a numeric score, (2) a short justification, and (3) 3–5 concrete suggestions for improvement.

rewrite_system_prompt: |
  You are a senior management consultant rewriting report narratives.
  Improve the narrative using the evaluator's feedback while staying strictly grounded in the provided data and constraints.
  Preserve all factual content but enhance clarity, structure, and executive tone.

# -----------------------------------------------------------------------------
# Narrative generation (tools/data_generation/report_generation/llm_client.generate_report_narrative)
# How: system parts joined with spaces; user template uses {target_words} and {context_json}
# -----------------------------------------------------------------------------
narrative_system_parts:
  - "You are an expert retail analytics consultant."
  - "Write clear, business-friendly PDF report narratives in plain English."
  - "Base all statements strictly on the provided data."
  - "When the data is insufficient to support a claim, explicitly state the limitation instead of guessing."

narrative_user_template: |
  You are preparing a narrative for a PDF analytics report.

  Use the JSON data below to write a cohesive narrative that includes:
  1) a short executive summary,
  2) key drivers and patterns you see in the data,
  3) any notable anomalies, risks, or data gaps, and
  4) 2–4 concrete, action-oriented recommendations for retail stakeholders.

  Keep the language concise and non-technical. Aim for roughly {target_words} words, but do not pad with obviously generic filler. Work strictly from the provided data and clearly mark any assumptions.

  Here is the data as JSON:

  {context_json}

# -----------------------------------------------------------------------------
# Report evaluation user message (llm_client.evaluate_report_quality)
# How: format(payload_json=...); system prompt remains evaluation_system_prompt above
# -----------------------------------------------------------------------------
evaluation_user_template: |
  Evaluate the quality of the following report.
  Provide three things in plain text:
  1) A numeric score from 0 to 10.
  2) A short justification (2–4 sentences).
  3) 3–5 concrete bullet-point suggestions for improvement.

  Here is the report context as JSON:

  {payload_json}

# -----------------------------------------------------------------------------
# Narrative rewrite user message (llm_client.rewrite_report_narrative)
# How: format(payload_json=...); system prompt remains rewrite_system_prompt above
# -----------------------------------------------------------------------------
rewrite_user_template: |
  Rewrite the report narrative to address the evaluator's feedback.
  Do not invent new facts; stay consistent with the original narrative's data.

  Here is the context as JSON:

  {payload_json}
